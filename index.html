<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQL 변수 치환기</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#fff; --ink:#1f2733; --muted:#7b8794;
    --line:#e3e8ef; --accent:#4f6ef7; --accent-d:#3b56d6;
    --mono:ui-monospace,SFMono-Regular,Consolas,"Courier New",monospace;
    --radius:12px; --shadow:0 1px 3px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.6 system-ui,"Segoe UI",-apple-system,"Malgun Gothic",sans-serif;
    padding:28px 16px;}
  .wrap{max-width:1080px;margin:0 auto}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px;margin-bottom:16px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:720px){.grid{grid-template-columns:1fr}}
  label{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
  label .hint{font-weight:400;color:var(--muted)}
  textarea{width:100%;font:12.5px/1.5 var(--mono);color:var(--ink);
    background:#fbfcfe;border:1px solid var(--line);border-radius:10px;padding:10px;resize:vertical}
  textarea:focus,input:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(79,110,247,.15);background:#fff}
  #out{background:#0f1729;color:#d6e2ff;border-color:#0f1729;white-space:pre;overflow:auto}

  .actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px}
  .spacer{flex:1}
  button{font:600 13.5px system-ui,sans-serif;padding:9px 18px;border-radius:9px;
    border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;transition:.12s}
  button:hover{background:#f1f4f9}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{background:var(--accent-d)}
  button:active{transform:translateY(1px)}
  button.flash{background:#1f7a48;border-color:#1f7a48;color:#fff}

  table{border-collapse:separate;border-spacing:0;width:100%;
    border:1px solid var(--line);border-radius:10px;overflow:hidden}
  tr+tr td{border-top:1px solid var(--line)}
  td{padding:7px 10px;vertical-align:middle}
  td.name{font-family:var(--mono);font-size:12.5px;white-space:nowrap;background:#fafbfe;
    color:#334;border-right:1px solid var(--line);width:1%}
  td.tag{width:1%;white-space:nowrap;border-right:1px solid var(--line)}
  .chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;
    background:#eef1f6;color:#5b6675}
  .chip.input{background:#e6f0ff;color:#2f5fd0}
  .chip.derived{background:#e7f6ee;color:#1f7a48}
  .chip.manual{background:#fff3e0;color:#b25e00}
  .chip.query{background:#fdeaf0;color:#b53a6b}
  input.val{width:100%;font:12.5px var(--mono);color:var(--ink);
    border:1px solid var(--line);border-radius:7px;padding:6px 8px;background:#fff}
  input.val.err{border-color:#e5484d;background:#fff5f5}
  input.val::placeholder{color:#aab2bd}
  .empty{color:var(--muted);padding:14px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
  <div class="grid">
    <div>
      <label>① 쿼리</label>
      <textarea id="query" rows="7" placeholder="변수(V_..., P_...)가 들어간 쿼리를 붙여넣기"></textarea>
    </div>
    <div>
      <label>② 변수 초기화 블록 <span class="hint">— 비우면 쿼리에서 자동 추출</span></label>
      <textarea id="init" rows="7" placeholder="V_PROC_DATE := TO_DATE(P_PROC_YM||'01','YYYYMMDD');&#10;SELECT SUBSTR(...) INTO V_YEARMONTH FROM DUAL;"></textarea>
    </div>
  </div>
  <div class="actions">
    <button id="analyze" class="primary">분석 ▶</button>
    <button id="reset">초기화</button>
  </div>
</div>

<div id="varsBox" class="card" hidden>
  <table><tbody id="varsBody"></tbody></table>
  <div class="actions">
    <button id="convert" class="primary">변환 ▶</button>
    <button id="copy">결과 복사</button>
  </div>
  <textarea id="out" rows="14" readonly style="margin-top:14px"></textarea>
</div>
</div>

<script src="app.js"></script>
<script>
let ASSIGNS=[], FREE=[];
const $=id=>document.getElementById(id);

$('analyze').onclick=()=>{
  ASSIGNS=parseInit($('init').value);
  FREE=freeVars(ASSIGNS);
  const known=new Set([...FREE,...ASSIGNS.map(a=>a.name)]);
  const qVars=scanVars($('query').value).filter(v=>!known.has(v)); // 초기화블록에 없는, 쿼리에만 있는 변수
  const body=$('varsBody'); body.innerHTML='';
  for(const name of FREE) body.appendChild(varRow(name,'입력','input',{free:true}));
  for(const a of ASSIGNS) body.appendChild(varRow(a.name,a.expr?'파생':'수동입력',a.expr?'derived':'manual',a.expr?{}:{manual:true}));
  for(const name of qVars) body.appendChild(varRow(name,'쿼리','query',{verbatim:true}));
  if(!FREE.length&&!ASSIGNS.length&&!qVars.length){body.innerHTML='<tr><td class="empty">변수를 찾지 못했어요. 초기화 블록을 넣거나, 쿼리에 P_/V_ 형태 변수가 있는지 확인하세요.</td></tr>';}
  $('varsBox').hidden=false;
  recompute();
  body.querySelectorAll('input[data-free],input[data-manual]').forEach(inp=>inp.oninput=recompute);
};

function varRow(name,tag,cls,opts){
  opts=opts||{};
  const tr=document.createElement('tr');
  tr.innerHTML='<td class="name">'+name+'</td><td class="tag"><span class="chip '+cls+'">'+tag+'</span></td>';
  const td=document.createElement('td');
  const inp=document.createElement('input');
  inp.className='val'; inp.value=''; inp.dataset.name=name;
  if(opts.free) inp.dataset.free='1';
  if(opts.manual){inp.dataset.manual='1';inp.placeholder='테이블 조회값 — 직접 입력';}
  if(opts.verbatim){inp.dataset.verbatim='1';inp.placeholder="치환할 값 그대로: '202606' 또는 숫자/TO_DATE(...)";}
  td.appendChild(inp); tr.appendChild(td);
  return tr;
}

function recompute(){
  const inputs={}; document.querySelectorAll('input.val').forEach(i=>inputs[i.dataset.name]=i);
  const env={};
  for(const name of FREE) env[name]={t:'str',v:unq(inputs[name].value)};
  for(const a of ASSIGNS){
    const inp=inputs[a.name]; if(!inp)continue;
    if(!a.expr){env[a.name]={t:'str',v:unq(inp.value)};continue;} // 수동입력값을 그대로 환경에 반영
    try{const v=evalExpr(a.expr,env);env[a.name]=v;inp.value=literalOf(v);inp.classList.remove('err');inp.title='';}
    catch(e){inp.value='';inp.classList.add('err');inp.title=e.message;}
  }
}

// 버튼 텍스트를 잠깐 바꿔 눌린 걸 알려줌
function flash(btn,msg){
  if(btn.dataset.orig===undefined)btn.dataset.orig=btn.textContent;
  btn.textContent=msg;btn.classList.add('flash');
  clearTimeout(btn._t);
  btn._t=setTimeout(()=>{btn.textContent=btn.dataset.orig;btn.classList.remove('flash');},1100);
}

$('convert').onclick=()=>{
  const vars=[];
  document.querySelectorAll('input.val').forEach(i=>{
    const literal=i.dataset.free?("'"+unq(i.value).replace(/'/g,"''")+"'"):i.value; // 입력변수만 자동 따옴표
    if(literal!=='')vars.push({name:i.dataset.name,literal});
  });
  $('out').value=substitute($('query').value,vars);
};
$('copy').onclick=(e)=>{
  const btn=e.currentTarget, o=$('out'); if(!o.value)return; // btn은 동기로 잡아둠(콜백에선 currentTarget이 null)
  const ok=()=>flash(btn,'복사됨 ✓');
  const legacy=()=>{ // 클립보드 API 거부/없을 때 폴백
    o.focus();o.select();
    let done=false;try{done=document.execCommand('copy');}catch(_){}
    o.blur();done?ok():flash(btn,'복사 실패');
  };
  if(navigator.clipboard&&window.isSecureContext) navigator.clipboard.writeText(o.value).then(ok).catch(legacy);
  else legacy();
};

$('reset').onclick=(e)=>{
  $('query').value='';$('init').value='';$('out').value='';
  $('varsBody').innerHTML='';$('varsBox').hidden=true;
  ASSIGNS=[];FREE=[];
  flash(e.currentTarget,'초기화됨');
};
</script>
</body>
</html>
