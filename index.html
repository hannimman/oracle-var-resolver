<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQL 변수 치환기</title>
<style>
  :root{
    --ink:#232b3a; --muted:#6b7488;
    --line:#e5e9f2; --line2:#eef1f7;
    --accent:#4f6ef7; --accent-d:#3b56d6;
    --mono:ui-monospace,SFMono-Regular,Consolas,"Courier New",monospace;
    --radius:12px; --shadow:0 12px 40px rgba(40,50,90,.15);
  }
  *{box-sizing:border-box}
  html,body{min-height:100%;overflow-x:hidden;max-width:100%}
  body{margin:0;color:var(--ink);
    font:14px/1.6 system-ui,"Segoe UI",-apple-system,"Malgun Gothic",sans-serif;
    padding:28px 16px;background:#070b18;}
  /* 오로라 배경: 어두운 바탕 위 진한 빛, 각자 떠다니며 숨쉬듯 — 몽환적 (JS로 transform) */
  .aurora{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;
    filter:blur(70px) saturate(1.35)}
  .aurora .blob{position:absolute;border-radius:50%;mix-blend-mode:screen;
    will-change:transform;opacity:.9}
  /* 라바 조명: 바닥 중앙에서 올라오는 따뜻한 글로우 (라바 모드에서만) */
  #lavaGlow{position:fixed;inset:0;z-index:-1;pointer-events:none;display:none;mix-blend-mode:screen;
    background:radial-gradient(60% 42% at 50% 102%, rgba(255,150,40,.9), rgba(255,70,0,.28) 45%, transparent 72%)}
  .wrap{max-width:1080px;margin:0 auto}

  .card{background:rgba(255,255,255,.82);backdrop-filter:blur(18px) saturate(1.6);
    -webkit-backdrop-filter:blur(18px) saturate(1.6);
    border:1px solid rgba(255,255,255,.85);border-radius:var(--radius);
    box-shadow:0 12px 40px rgba(40,50,90,.14);padding:18px;margin-bottom:16px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:720px){.grid{grid-template-columns:1fr}}
  label{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
  label .hint{font-weight:400;color:var(--muted)}
  textarea{width:100%;font:12.5px/1.5 var(--mono);color:var(--ink);
    background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:10px;padding:10px;resize:vertical}
  textarea:focus,input:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(79,110,247,.18);background:#fff}
  textarea::placeholder{color:#9aa3b5}
  #out{background:#0f1729;color:#d6e2ff;border:1px solid #0f1729;white-space:pre;overflow:auto}

  .actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:14px}
  .opt{display:flex;align-items:center;gap:6px;font-weight:400;font-size:12.5px;color:var(--muted);cursor:pointer}
  .opt input{position:absolute;opacity:0;width:0;height:0}
  .sw{position:relative;flex:0 0 auto;width:34px;height:18px;border-radius:999px;background:#c7cdd8;transition:.2s}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:.2s}
  .opt input:checked+.sw{background:var(--accent)}
  .opt input:checked+.sw::after{transform:translateX(16px)}
  .opt input:focus-visible+.sw{box-shadow:0 0 0 3px rgba(79,110,247,.3)}
  .spacer{flex:1}
  button{font:600 13.5px system-ui,sans-serif;padding:9px 18px;border-radius:9px;
    border:1px solid var(--line);background:rgba(255,255,255,.9);color:var(--ink);cursor:pointer;transition:.12s}
  button:hover{background:#f1f4f9}
  button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.primary:hover{background:var(--accent-d)}
  button:active{transform:translateY(1px)}
  button.flash{background:#1f7a48;border-color:#1f7a48;color:#fff}
  /* 텍스트가 바뀌어도(복사됨 ✓ / 초기화됨) 폭·높이 고정 → UI 안 밀림 */
  #copy,#reset{height:36px;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden}
  #copy{width:108px} #reset{width:90px}

  table{border-collapse:separate;border-spacing:0;width:100%;background:#fff;
    border:1px solid var(--line);border-radius:10px;overflow:hidden}
  tr+tr td{border-top:1px solid var(--line2)}
  td{padding:7px 10px;vertical-align:middle}
  td.name{font-family:var(--mono);font-size:12.5px;white-space:nowrap;background:#fafbfe;
    color:#334;border-right:1px solid var(--line2);width:1%}
  td.tag{width:1%;white-space:nowrap;border-right:1px solid var(--line2)}
  .chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;
    background:#eef1f6;color:#5b6675}
  .chip.input{background:#e6f0ff;color:#2f5fd0}
  .chip.derived{background:#e7f6ee;color:#1f7a48}
  .chip.manual{background:#fff3e0;color:#b25e00}
  .chip.query{background:#fdeaf0;color:#b53a6b}
  input.val{width:100%;font:12.5px var(--mono);color:var(--ink);
    border:1px solid var(--line);border-radius:7px;padding:6px 8px;background:#fff}
  input.val.err{border-color:#e5484d;background:#fff5f5}
  input.val::placeholder{color:#aab2bd}
  .addvar{position:relative;display:inline-block;margin-left:7px;color:var(--accent);
    font-weight:700;font-size:15px;cursor:pointer;user-select:none}
  .addvar .popup{display:none;position:absolute;top:100%;left:0;z-index:20;width:270px;
    background:rgba(255,255,255,.97);backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);
    padding:12px;font-weight:400;color:var(--ink);cursor:default}
  .addvar:hover .popup,.addvar .popup:hover{display:block}
  .popup h4{margin:8px 0 6px;font-size:12px;font-weight:600;color:#46506a}
  .popup h4:first-child{margin-top:0}
  .popup .pinput{display:flex;gap:6px}
  .popup .pinput input{flex:1;font:12px var(--mono);color:var(--ink);background:#fff;
    border:1px solid var(--line);border-radius:6px;padding:5px 7px}
  .popup .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .popup .chips:empty{display:none}
  .popup .c{display:inline-flex;align-items:center;background:#eef1f6;border-radius:999px;
    padding:2px 4px 2px 9px;font:600 11px var(--mono);color:#46506a}
  .popup .c b{cursor:pointer;color:#9aa3b2;padding:0 4px;font-size:13px;line-height:1}
  .popup .c b:hover{color:#e5484d}
  .popup .hint{display:block;margin-top:8px;font-size:11px;color:var(--muted)}
  .quick{display:flex;gap:5px;margin-top:5px}
  button.mini{font:600 11px system-ui,sans-serif;padding:3px 9px;border-radius:6px;
    border:1px solid var(--line);background:#f1f4f9;color:#46506a}
  button.mini:hover{background:#e6ecf5}
  .empty{color:var(--muted);padding:14px;text-align:center}
  #ver{position:fixed;top:8px;left:10px;z-index:5;font:11px var(--mono);
    color:rgba(255,255,255,.35);pointer-events:none;user-select:none;letter-spacing:.02em}
  .bgtoggle{position:fixed;right:20px;bottom:22px;z-index:10;cursor:pointer;display:inline-flex;
    padding:7px;border-radius:999px;background:rgba(8,12,24,.6);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);box-shadow:0 4px 16px rgba(0,0,0,.55)}
  .bgtoggle input{position:absolute;opacity:0;width:0;height:0}
  .bgtoggle .sw{width:48px;height:27px;background:rgba(150,160,180,.95);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.5)}
  .bgtoggle .sw::after{width:21px;height:21px;top:3px;left:3px;box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .bgtoggle input:checked+.sw{background:#ff5a1f}
  .bgtoggle input:checked+.sw::after{transform:translateX(21px)}
</style>
</head>
<body>
<div id="ver">v1.5.3</div>
<label class="bgtoggle"><input type="checkbox" id="bgSwitch"><span class="sw"></span></label>
<div class="aurora" id="aurora"></div>
<div id="lavaGlow"></div>
<div class="wrap">
<div class="card">
  <div class="grid">
    <div>
      <label>① 쿼리<span class="addvar" title="변수 프리픽스/이름 등록">＋<div class="popup">
        <h4>변수 프리픽스 추가 <span class="hint">(예: GV_)</span></h4>
        <div class="pinput"><input id="cvPrefix" placeholder="GV_" autocomplete="off"><button type="button" class="mini" id="cvPrefixAdd">추가</button></div>
        <div class="chips" id="cvPrefixList"></div>
        <h4>변수명 직접 추가 <span class="hint">(프리픽스 없는 변수)</span></h4>
        <div class="pinput"><input id="cvName" placeholder="gYearMonth" autocomplete="off"><button type="button" class="mini" id="cvNameAdd">추가</button></div>
        <div class="chips" id="cvNameList"></div>
        <div class="hint">기본 P_ / V_ 는 항상 포함됩니다.</div>
      </div></span></label>
      <textarea id="query" rows="7" placeholder="변수 쿼리를 붙여넣기 (V_SQL := V_SQL || '...' 형태의 동적쿼리도 자동 감지)"></textarea>
    </div>
    <div>
      <label>② 변수 초기화 블록 <span class="hint">— 비우면 쿼리에서 자동 추출</span></label>
      <textarea id="init" rows="7" placeholder="V_PROC_DATE := TO_DATE(P_PROC_YM||'01','YYYYMMDD');&#10;SELECT SUBSTR(...) INTO V_YEARMONTH FROM DUAL;"></textarea>
    </div>
  </div>
  <div class="actions">
    <button id="analyze" class="primary">분석 ▶</button>
    <button id="reset">초기화</button>
  </div>
</div>

<div id="varsBox" class="card" hidden>
  <table><tbody id="varsBody"></tbody></table>
  <div class="actions">
    <button id="convert" class="primary">변환 ▶</button>
    <button id="copy">결과 복사</button>
    <label class="opt"><input type="checkbox" id="stripBlank" checked><span class="sw"></span> 빈 줄 제거</label>
  </div>
  <textarea id="out" rows="14" readonly style="margin-top:14px"></textarea>
</div>
</div>

<script>document.write('<script src="app.js?v='+Date.now()+'"><\/script>');</script>
<script>document.write('<script src="dynamic.js?v='+Date.now()+'"><\/script>');</script>
<script>
let ASSIGNS=[], FREE=[], MODE='basic', PROGRAM=null;
const $=id=>document.getElementById(id);

/* ---------- 사용자 등록 변수(프리픽스/이름) — localStorage ---------- */
const LS='ovr_customVars';
let CUSTOM={prefixes:[],names:[]};
try{const c=JSON.parse(localStorage.getItem(LS));if(c){CUSTOM.prefixes=c.prefixes||[];CUSTOM.names=c.names||[];}}catch(_){}
function saveCustom(){try{localStorage.setItem(LS,JSON.stringify(CUSTOM));}catch(_){}}
function renderChips(){
  const mk=(list,arr)=>{list.innerHTML='';arr.forEach((v,i)=>{
    const c=document.createElement('span');c.className='c';c.textContent=v;
    const x=document.createElement('b');x.textContent='×';x.title='삭제';
    x.onclick=()=>{arr.splice(i,1);saveCustom();renderChips();};
    c.appendChild(x);list.appendChild(c);
  });};
  mk($('cvPrefixList'),CUSTOM.prefixes);
  mk($('cvNameList'),CUSTOM.names);
}
function addCustom(arr,raw){
  const v=(raw||'').trim();
  if(v&&!arr.some(x=>x.toLowerCase()===v.toLowerCase())){arr.push(v);saveCustom();renderChips();}
}
$('cvPrefixAdd').onclick=()=>{addCustom(CUSTOM.prefixes,$('cvPrefix').value);$('cvPrefix').value='';};
$('cvNameAdd').onclick=()=>{addCustom(CUSTOM.names,$('cvName').value);$('cvName').value='';};
$('cvPrefix').onkeydown=e=>{if(e.key==='Enter')$('cvPrefixAdd').onclick();};
$('cvName').onkeydown=e=>{if(e.key==='Enter')$('cvNameAdd').onclick();};
renderChips();

// 동적쿼리 자동 감지: := 대입 + (|| 연결 또는 IF..THEN)
function isDynamic(q){return /:=/.test(q) && (/\|\|/.test(q) || /\bIF\b[\s\S]*\bTHEN\b/i.test(q));}

$('analyze').onclick=()=>{
  const q=$('query').value;
  const body=$('varsBody'); body.innerHTML='';
  if(isDynamic(q)){
    MODE='dynamic';
    const r=parseProgram(q); PROGRAM=r.program; FREE=r.freeVars; ASSIGNS=[];
    const defs=condDefaults(PROGRAM); // IF 조건 값으로 기본값
    for(const name of FREE) body.appendChild(varRow(name,'동적','input',{free:true,value:defs[name]||''}));
    if(!FREE.length) body.innerHTML='<tr><td class="empty">동적쿼리에서 입력할 변수를 찾지 못했어요.</td></tr>';
  }else{
    MODE='basic'; PROGRAM=null;
    ASSIGNS=parseInit($('init').value);
    FREE=freeVars(ASSIGNS);
    const known=new Set([...FREE,...ASSIGNS.map(a=>a.name)].map(s=>s.toLowerCase()));
    const prefixes=['P_','V_',...CUSTOM.prefixes];
    const qVars=scanVars(q,prefixes,CUSTOM.names).filter(v=>!known.has(v.toLowerCase())); // 초기화블록에 없는, 쿼리에만 있는 변수(대소문자 무시)
    for(const name of FREE) body.appendChild(varRow(name,'입력','input',{free:true}));
    for(const a of ASSIGNS) body.appendChild(varRow(a.name,a.expr?'파생':'수동입력',a.expr?'derived':'manual',a.expr?{}:{manual:true}));
    for(const name of qVars) body.appendChild(varRow(name,'쿼리','query',{verbatim:true}));
    if(!FREE.length&&!ASSIGNS.length&&!qVars.length){body.innerHTML='<tr><td class="empty">변수를 찾지 못했어요. 초기화 블록을 넣거나, 쿼리에 P_/V_ 형태 변수가 있는지 확인하세요.</td></tr>';}
  }
  $('varsBox').hidden=false;
  recompute();
  body.querySelectorAll('input.val').forEach(inp=>inp.addEventListener('input',()=>{
    if(inp.dataset.free||inp.dataset.manual)recompute();
    $('out').value=''; // 입력이 바뀌면 이전 변환 결과 무효화
  }));
};

function varRow(name,tag,cls,opts){
  opts=opts||{};
  const tr=document.createElement('tr');
  tr.innerHTML='<td class="name">'+name+'</td><td class="tag"><span class="chip '+cls+'">'+tag+'</span></td>';
  const td=document.createElement('td');
  const inp=document.createElement('input');
  inp.className='val'; inp.value=opts.value||''; inp.dataset.name=name;
  if(opts.free) inp.dataset.free='1';
  if(opts.manual){inp.dataset.manual='1';inp.placeholder='테이블 조회값 — 직접 입력';}
  if(opts.verbatim){inp.dataset.verbatim='1';inp.placeholder="치환할 값 그대로: '202606' 또는 숫자/TO_DATE(...)";}
  td.appendChild(inp);
  if(opts.free||opts.verbatim){ // 입력/쿼리 변수에 추천 버튼
    const fill=v=>{inp.value=opts.free?v:("'"+v+"'");recompute();$('out').value='';};
    let btns=null;
    if(/YM|YEARMONTH|DATE|DT/i.test(name)) // 월/날짜
      btns=[['이번달',0],['전달',1],['전전달',2]].map(([l,b])=>[l,()=>fill(monthValue(b,name))]);
    else{ const s=SUGGEST.find(x=>x.re.test(name)); if(s)btns=s.opts.map(([l,v])=>[l,()=>fill(v)]); }
    if(btns){
      const box=document.createElement('div');box.className='quick';
      btns.forEach(([label,fn])=>{const b=document.createElement('button');b.type='button';b.className='mini';b.textContent=label;b.onclick=fn;box.appendChild(b);});
      td.appendChild(box);
    }
  }
  tr.appendChild(td);
  return tr;
}
// 변수 이름별 값 추천 (코드값 등). 월/날짜는 monthValue로 따로 처리.
const SUGGEST=[
  {re:/BIZ_SECT/i, opts:[['유아','100'],['초등','200'],['중학','300'],['고등','400']]},
  {re:/DEPT_CD/i,  opts:[['상담','1'],['관리','2']]},
  {re:/CRTR_ID/i,  opts:[['test','test']]},
];
// 현재 달 기준 back개월 전. DATE/DT 이름이면 그 달 '마지막 날'(YYYY-MM-DD), 아니면 YYYYMM
function monthValue(back,name){
  const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-back);
  const y=d.getFullYear(),mo=d.getMonth(),m=String(mo+1).padStart(2,'0');
  if(/DATE|DT/i.test(name)){const last=new Date(y,mo+1,0).getDate();return `${y}-${m}-${String(last).padStart(2,'0')}`;}
  return `${y}${m}`;
}

function recompute(){
  const inputs={}; document.querySelectorAll('input.val').forEach(i=>inputs[i.dataset.name]=i);
  const env={};
  for(const name of FREE) env[name]={t:'str',v:unq(inputs[name].value)};
  for(const a of ASSIGNS){
    const inp=inputs[a.name]; if(!inp)continue;
    if(!a.expr){env[a.name]={t:'str',v:unq(inp.value)};continue;} // 수동입력값을 그대로 환경에 반영
    try{const v=evalExpr(a.expr,env);env[a.name]=v;inp.value=literalOf(v);inp.classList.remove('err');inp.title='';inp.placeholder='';}
    catch(e){inp.value='';inp.classList.add('err');inp.title=e.message;inp.placeholder='⚠ '+e.message;} // 에러 이유를 칸에 표시
  }
}

// 버튼 텍스트를 잠깐 바꿔 눌린 걸 알려줌
function flash(btn,msg){
  if(btn.dataset.orig===undefined)btn.dataset.orig=btn.textContent;
  btn.textContent=msg;btn.classList.add('flash');
  clearTimeout(btn._t);
  btn._t=setTimeout(()=>{btn.textContent=btn.dataset.orig;btn.classList.remove('flash');},1100);
}

$('convert').onclick=()=>{
  let res;
  if(MODE==='dynamic'){
    const vars={}; document.querySelectorAll('input.val').forEach(i=>vars[i.dataset.name]=i.value);
    const acc=assemble(PROGRAM,vars); res=acc[mainVar(acc)]||'';
  }else{
    const vars=[];
    document.querySelectorAll('input.val').forEach(i=>{
      const literal=i.dataset.free?("'"+unq(i.value).replace(/'/g,"''")+"'"):i.value; // 입력변수만 자동 따옴표
      if(literal!=='')vars.push({name:i.dataset.name,literal});
    });
    res=substitute($('query').value,vars);
  }
  if($('stripBlank').checked) res=res.split('\n').filter(l=>l.trim()!=='').join('\n'); // 빈 줄 제거
  $('out').value=res;
};
$('stripBlank').onchange=()=>{if($('out').value!=='')$('convert').click();}; // 토글 시 결과 갱신
// 결과창이 사진처럼 축소·회전하며 복사 버튼 속으로 쏙 들어가는 애니메이션
function copyFly(){
  const o=$('out'), btn=$('copy'); if(!o.value)return;
  const r=o.getBoundingClientRect(), b=btn.getBoundingClientRect();
  const g=document.createElement('div');
  g.textContent=o.value.slice(0,4000);
  g.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;height:${r.height}px;`
    +`background:#0f1729;color:#d6e2ff;font:12.5px/1.5 ui-monospace,Consolas,monospace;padding:10px;`
    +`white-space:pre;overflow:hidden;border-radius:8px;box-shadow:0 14px 44px rgba(0,0,0,.5);`
    +`z-index:60;pointer-events:none;transform-origin:center center;`
    +`transition:transform .55s cubic-bezier(.45,.05,.15,1), opacity .55s ease-in;`;
  document.body.appendChild(g);
  const dx=(b.left+b.width/2)-(r.left+r.width/2), dy=(b.top+b.height/2)-(r.top+r.height/2);
  requestAnimationFrame(()=>{ g.style.transform=`translate(${dx}px,${dy}px) scale(.03) rotate(-6deg)`; g.style.opacity='0'; });
  setTimeout(()=>g.remove(),600);
}

$('copy').onclick=(e)=>{
  const btn=e.currentTarget, o=$('out'); if(!o.value)return; // btn은 동기로 잡아둠(콜백에선 currentTarget이 null)
  const ok=()=>{copyFly();flash(btn,'복사됨 ✓');};
  const legacy=()=>{ // 클립보드 API 거부/없을 때 폴백
    o.focus();o.select();
    let done=false;try{done=document.execCommand('copy');}catch(_){}
    o.blur();done?ok():flash(btn,'복사 실패');
  };
  if(navigator.clipboard&&window.isSecureContext) navigator.clipboard.writeText(o.value).then(ok).catch(legacy);
  else legacy();
};

$('reset').onclick=(e)=>{
  $('query').value='';$('init').value='';$('out').value='';
  $('varsBody').innerHTML='';$('varsBox').hidden=true;
  ASSIGNS=[];FREE=[];MODE='basic';PROGRAM=null;
  flash(e.currentTarget,'초기화됨');
};

/* ---------- 버전 표시(좌상단) — 배포마다 이 값만 올림 ---------- */
const VER='v1.5.3';
$('ver').textContent=VER;

/* ---------- 배경: 오로라 ↔ 라바 무드등 (우하단 토글, localStorage 저장) ---------- */
(()=>{
  const el=$('aurora'); if(!el)return;
  const BLOBS=[
    {c:'70,110,255', x:24,y:28,s:62,sp:.18,ph:0.0,d:1.0},
    {c:'235,70,160', x:80,y:20,s:54,sp:.13,ph:1.3,d:0.6},
    {c:'40,225,200', x:72,y:80,s:68,sp:.16,ph:2.6,d:1.3},
    {c:'150,80,255', x:26,y:82,s:58,sp:.11,ph:3.9,d:0.8},
    {c:'90,170,255', x:54,y:48,s:46,sp:.21,ph:5.2,d:0.4},
  ];
  const nodes=BLOBS.map(b=>{
    const n=document.createElement('div');n.className='blob';
    n.style.left=b.x+'%';n.style.top=b.y+'%';n.style.width=b.s+'vw';n.style.height=b.s+'vw';
    el.appendChild(n);return n;
  });
  // 라바(마그마) — 한 가지 색으로 통일
  const LAVA=['255,105,30'];
  const LAVA_CAP=16;
  const lavaPool=[]; // 라바 전용 DOM 풀
  for(let i=0;i<LAVA_CAP;i++){const n=document.createElement('div');n.className='blob';n.style.width=n.style.height='0';el.appendChild(n);lavaPool.push(n);}
  let lava=[]; // {lx,ly(%), vx,vy, sz(vw), ci, ph}
  function newBlob(lx,ly,sz,ci){return {lx,ly,vx:(Math.random()-0.5)*0.04,vy:(Math.random()-0.5)*0.04,sz,ci,ph:Math.random()*6.28,cd:0};}
  function initLava(){lava=[[30,35,16],[68,30,13],[50,58,18],[38,74,13],[72,66,15]].map((s,i)=>newBlob(s[0],s[1],s[2],i%LAVA.length));}
  function styleLava(n,b){
    n.style.mixBlendMode='normal';n.style.opacity='1';n.style.width=n.style.height=b.sz+'vw';
    n.style.left=b.lx+'%';n.style.top=b.ly+'%';n.style.transform='translate(-50%,-50%)';
    n.style.background=`radial-gradient(circle at center, rgba(${LAVA[b.ci]},1) 50%, rgba(${LAVA[b.ci]},0) 70%)`;}

  let mode='aurora';
  function setMode(m){
    mode=m;
    const glow=$('lavaGlow');
    if(m==='lava'){ // 마그마: 어두운 배경 + goo(메타볼) + 바닥 조명
      el.style.background='#0a0912'; el.style.filter='blur(9px) contrast(11)';
      nodes.forEach(n=>{n.style.width=n.style.height='0';}); // 오로라 방울 숨김
      if(glow)glow.style.display='block';
      if(!lava.length) initLava();
    }else{ // 오로라: 넓게 번지고 스크린 블렌드
      el.style.background='transparent'; el.style.filter='blur(70px) saturate(1.35)';
      if(glow)glow.style.display='none';
      lavaPool.forEach(n=>{n.style.width=n.style.height='0';}); // 라바 방울 숨김
      nodes.forEach((n,i)=>{n.style.width=n.style.height=BLOBS[i].s+'vw';n.style.mixBlendMode='screen';
        n.style.background=`radial-gradient(circle at center, rgba(${BLOBS[i].c},.9), rgba(${BLOBS[i].c},0) 70%)`;});
    }
  }
  const bg=$('bgSwitch');
  if(bg){
    bg.checked=(localStorage.getItem('ovr_bg')==='lava');
    bg.addEventListener('change',()=>{const m=bg.checked?'lava':'aurora';try{localStorage.setItem('ovr_bg',m);}catch(_){}setMode(m);});
  }
  setMode((bg&&bg.checked)?'lava':'aurora');

  if(matchMedia('(prefers-reduced-motion:reduce)').matches){nodes.forEach(n=>n.style.transform='translate(-50%,-50%)');return;}
  let mx=0,my=0,cx=0,cy=0,t=0,energy=0,eTarget=0;
  addEventListener('mousemove',e=>{mx=e.clientX/innerWidth-0.5;my=e.clientY/innerHeight-0.5;},{passive:true});
  addEventListener('click',e=>{
    if(mode!=='lava' && e.target.closest('button')) eTarget=Math.min(eTarget+1.2,1.8); // 오로라: 버튼 클릭 시 다이나믹
  },{passive:true});
  function simulateLava(){
    const ar=innerHeight/innerWidth;
    for(const b of lava){
      if(b.cd>0)b.cd--;
      b.vy+=Math.sin(t*0.6+b.ph)*0.0015; b.vx+=Math.sin(t*0.4+b.ph*1.4)*0.001; // 부력 + 흔들림(느리게)
      b.vx*=0.98; b.vy*=0.98;
      b.vx=Math.max(-0.35,Math.min(0.35,b.vx)); b.vy=Math.max(-0.35,Math.min(0.35,b.vy));
      b.lx+=b.vx; b.ly+=b.vy;
      if(b.lx<8){b.lx=8;b.vx=Math.abs(b.vx)*0.6;} if(b.lx>92){b.lx=92;b.vx=-Math.abs(b.vx)*0.6;}
      if(b.ly<12){b.ly=12;b.vy=Math.abs(b.vy)*0.6;} if(b.ly>90){b.ly=90;b.vy=-Math.abs(b.vy)*0.6;}
    }
    lavaPool.forEach((n,i)=>{ if(i<lava.length) styleLava(n,lava[i]); else n.style.width=n.style.height='0'; });
  }
  (function frame(){
    eTarget*=0.95; energy+=(eTarget-energy)*0.06;
    const amp=1+energy*1.4, brk=1+energy*1.2; t+=0.012*(1+energy*2.5);
    cx+=(mx-cx)*0.04; cy+=(my-cy)*0.04;
    if(mode==='lava'){ simulateLava(); requestAnimationFrame(frame); return; }
    BLOBS.forEach((b,i)=>{ // 오로라: 사방으로 몽환적 드리프트
      const ox=(Math.sin(t*b.sp*6+b.ph)*15 + Math.sin(t*b.sp*2.3+b.ph*1.7)*9)*amp + cx*10*b.d;
      const oy=(Math.cos(t*b.sp*5+b.ph)*15 + Math.cos(t*b.sp*1.9+b.ph*1.3)*9)*amp + cy*10*b.d;
      const sc=1 + Math.sin(t*b.sp*4+b.ph)*0.25*brk;
      nodes[i].style.transform=`translate(-50%,-50%) translate(${ox}vw,${oy}vw) scale(${sc})`;
    });
    requestAnimationFrame(frame);
  })();
})();
</script>
</body>
</html>
